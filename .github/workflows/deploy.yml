# Build the Expo Web bundle and publish it to GitHub Pages on every push to main.
#
# How it works:
#   1. `expo export -p web --output-dir dist` produces a static SPA in dist/
#   2. The actions/upload-pages-artifact + deploy-pages combo handles the rest;
#      no gh-pages branch, no manual asset commits, no secrets needed beyond
#      the auto-injected GITHUB_TOKEN.
#
# The app reads experiments.baseUrl from app.json (currently "/pulsehealth"),
# which Metro bakes into asset href/src paths during the export. Don't deploy
# this workflow into a repo whose name doesn't match that base path — the
# subpath is the contract between the bundle and Pages' URL.

name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Run one deploy at a time. If a newer push lands while one is mid-flight,
# cancel the in-progress run rather than queueing.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build static web bundle
        run: npx expo export -p web --output-dir dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
